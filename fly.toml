app = 'backend-lively-hill-7043'
primary_region = 'arn'

[build]

[env]
  ALLOWED_ORIGINS = 'https://axliner.com,https://www.axliner.com'
  ANONYMOUS_MAX_FILES_PER_BATCH = '3'
  API_V1_PREFIX = '/api/v1'
  CLEANUP_INTERVAL_HOURS = '4'
  CORS_ALLOW_CREDENTIALS = 'true'
  CORS_ALLOW_HEADERS = '["*"]'
  CORS_ALLOW_METHODS = '["GET","POST","PUT","DELETE","OPTIONS"]'
  CORS_ALLOW_ORIGIN_REGEX = 'https://.*\.vercel\.app'
  DEBUG = 'false'
  DOCS_URL = '/docs'
  ENVIRONMENT = 'production'
  FILE_RETENTION_HOURS = '720'
  FREE_MAX_FILES_PER_BATCH = '5'
  FRONTEND_URL = 'https://www.axliner.com'
  HOST = '0.0.0.0'
  INBOUND_EMAIL_DOMAIN = 'intake.axliner.com'
  POLAR_MAX_MONTHLY_CREDITS = '2500'
  POLAR_MAX_MONTHLY_PRICE_CENTS = '3900'
  POLAR_MAX_YEARLY_CREDITS = '30000'
  POLAR_MAX_YEARLY_PRICE_CENTS = '39000'
  POLAR_MEGA_MONTHLY_CREDITS = '7000'
  POLAR_MEGA_MONTHLY_PRICE_CENTS = '7900'
  POLAR_MEGA_YEARLY_CREDITS = '84000'
  POLAR_MEGA_YEARLY_PRICE_CENTS = '79000'
  POLAR_PRO_MONTHLY_CREDITS = '1000'
  POLAR_PRO_MONTHLY_PRICE_CENTS = '1900'
  POLAR_PRO_YEARLY_CREDITS = '12000'
  POLAR_PRO_YEARLY_PRICE_CENTS = '19000'
  LEMONSQUEEZY_MAX_MONTHLY_CREDITS = '2500'
  LEMONSQUEEZY_MAX_MONTHLY_PRICE_CENTS = '2000'
  LEMONSQUEEZY_MAX_YEARLY_CREDITS = '30000'
  LEMONSQUEEZY_MAX_YEARLY_PRICE_CENTS = '19000'
  LEMONSQUEEZY_MEGA_MONTHLY_CREDITS = '7000'
  LEMONSQUEEZY_MEGA_MONTHLY_PRICE_CENTS = '5000'
  LEMONSQUEEZY_MEGA_YEARLY_CREDITS = '84000'
  LEMONSQUEEZY_MEGA_YEARLY_PRICE_CENTS = '53000'
  LEMONSQUEEZY_PRO_MONTHLY_CREDITS = '1000'
  LEMONSQUEEZY_PRO_MONTHLY_PRICE_CENTS = '1000'
  LEMONSQUEEZY_PRO_YEARLY_CREDITS = '12000'
  LEMONSQUEEZY_PRO_YEARLY_PRICE_CENTS = '10000'
  LOG_FORMAT = 'json'
  LOG_LEVEL = 'INFO'
  MAX_BATCH_SIZE = '100'
  MAX_CONCURRENT_OCR_CALLS = '3'
  MAX_FILE_SIZE_MB = '10'
  MAX_MAX_FILES_PER_BATCH = '50'
  MEGA_MAX_FILES_PER_BATCH = '100'
  OCR_CLIENT_MAX_RETRIES = '0'
  OCR_FAILOVER_ATTEMPTS = '1'
  OCR_MAX_ATTEMPTS_PER_MODEL = '2'
  OCR_REQUEST_TIMEOUT = '45'
  OCR_RETRY_BASE_DELAY_SECONDS = '1.5'
  OCR_RETRY_MAX_DELAY_SECONDS = '8'
  OCR_RETRY_AFTER_CAP_SECONDS = '15'
  OLMOCR_BASE_DELAY_SECONDS = '0.4'
  OLMOCR_EXPONENTIAL_BACKOFF = 'false'
  PORT = '8080'
  PRO_MAX_FILES_PER_BATCH = '30'
  QUEUE_ADMISSION_MAX_ACTIVE_JOBS = '100'
  QUEUE_ADMISSION_MAX_QUEUED_JOBS = '50'
  QUICKBOOKS_ENVIRONMENT = 'production'
  QUICKBOOKS_MINOR_VERSION = '75'
  QUICKBOOKS_REDIRECT_URI = 'https://backend-lively-hill-7043.fly.dev/api/v1/integrations/quickbooks/callback'
  RATE_LIMIT_ANONYMOUS_IMAGES_PER_DAY = '9'
  RATE_LIMIT_ANONYMOUS_JOBS_PER_MINUTE = '3'
  RATE_LIMIT_ANONYMOUS_RUNS_PER_DAY = '3'
  RATE_LIMIT_AUTHENTICATED_IMAGES_PER_DAY = '30'
  RATE_LIMIT_AUTHENTICATED_JOBS_PER_MINUTE = '12'
  RATE_LIMIT_AUTHENTICATED_RUNS_PER_DAY = '3'
  RATE_LIMIT_IP_JOBS_PER_MINUTE = '20'
  RATE_LIMIT_MAX_IMAGES_PER_DAY = '2500'
  RATE_LIMIT_MEGA_IMAGES_PER_DAY = '7000'
  RATE_LIMIT_PRO_IMAGES_PER_DAY = '1000'
  RATE_LIMIT_WINDOW_SECONDS = '60'
  REDIS_CONNECT_TIMEOUT = '10'
  REDIS_MAX_CONNECTIONS = '20'
  REDIS_SOCKET_TIMEOUT = '30'
  REDOC_URL = '/redoc'
  SUPABASE_STORAGE_BUCKET = 'jobs'
  TEMP_STORAGE_PATH = '/app/temp_storage'
  WORKER_CONCURRENCY = '3'

[processes]
  app = 'python start.py'
  worker = 'env SERVICE_TYPE=worker python start.py'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/docs'

[[vm]]
  processes = ['app']
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[vm]]
  processes = ['worker']
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
