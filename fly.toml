# fly.toml app configuration file
#
# For a new Fly account:
# 1. Run `fly launch`
# 2. Let Fly replace the app name below
# 3. Attach/create Upstash Redis
# 4. Set private values with `fly secrets set`

app = 'backend-lively-hill-7043'
primary_region = 'arn'

[build]

[processes]
  app = 'python start.py'
  worker = 'env SERVICE_TYPE=worker python start.py'

[env]
  ALLOWED_ORIGINS = 'https://axliner.com,https://www.axliner.com'
  ANONYMOUS_MAX_FILES_PER_BATCH = '5'
  API_V1_PREFIX = '/api/v1'
  CLEANUP_INTERVAL_HOURS = '4'
  CORS_ALLOW_CREDENTIALS = 'true'
  CORS_ALLOW_HEADERS = '["*"]'
  CORS_ALLOW_METHODS = '["GET","POST","PUT","DELETE","OPTIONS"]'
  CORS_ALLOW_ORIGIN_REGEX = 'https://.*\.vercel\.app'
  DEBUG = 'false'
  DOCS_URL = '/docs'
  ENVIRONMENT = 'production'
  FILE_RETENTION_HOURS = '48'
  FRONTEND_URL = 'https://www.axliner.com'
  ENTERPRISE_MAX_FILES_PER_BATCH = '50'
  FREE_MAX_FILES_PER_BATCH = '10'
  HOST = '0.0.0.0'
  LOG_FORMAT = 'json'
  LOG_LEVEL = 'INFO'
  MAX_BATCH_SIZE = '50'
  MAX_CONCURRENT_OCR_CALLS = '3'
  MAX_FILE_SIZE_MB = '10'
  PORT = '8080'
  REDIS_CONNECT_TIMEOUT = '10'
  REDIS_MAX_CONNECTIONS = '20'
  REDIS_SOCKET_TIMEOUT = '30'
  RATE_LIMIT_ANONYMOUS_IMAGES_PER_DAY = '5'
  RATE_LIMIT_ANONYMOUS_JOBS_PER_MINUTE = '3'
  RATE_LIMIT_AUTHENTICATED_IMAGES_PER_DAY = '200'
  RATE_LIMIT_AUTHENTICATED_JOBS_PER_MINUTE = '12'
  RATE_LIMIT_ENTERPRISE_IMAGES_PER_DAY = '5000'
  RATE_LIMIT_IP_JOBS_PER_MINUTE = '20'
  RATE_LIMIT_PRO_IMAGES_PER_DAY = '1000'
  RATE_LIMIT_WINDOW_SECONDS = '60'
  REDOC_URL = '/redoc'
  PRO_MAX_FILES_PER_BATCH = '25'
  QUEUE_ADMISSION_MAX_ACTIVE_JOBS = '100'
  QUEUE_ADMISSION_MAX_QUEUED_JOBS = '50'
  SUPABASE_STORAGE_BUCKET = 'jobs'
  TEMP_STORAGE_PATH = '/app/temp_storage'
  WORKER_CONCURRENCY = '2'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/docs'

[[vm]]
  memory = '4gb'
  cpus = 2
  memory_mb = 4096
