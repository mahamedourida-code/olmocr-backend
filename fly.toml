# fly.toml app configuration file generated for backend-lively-hill-7043 on 2026-05-12T03:07:18+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-lively-hill-7043'
primary_region = 'arn'

[build]

[env]
  ALLOWED_ORIGINS = 'https://axliner.com,https://www.axliner.com'
  ANONYMOUS_MAX_FILES_PER_BATCH = '3'
  API_V1_PREFIX = '/api/v1'
  CLEANUP_INTERVAL_HOURS = '4'
  CORS_ALLOW_CREDENTIALS = 'true'
  CORS_ALLOW_HEADERS = '["*"]'
  CORS_ALLOW_METHODS = '["GET","POST","PUT","DELETE","OPTIONS"]'
  CORS_ALLOW_ORIGIN_REGEX = 'https://.*\.vercel\.app'
  DEBUG = 'false'
  DOCS_URL = '/docs'
  ENVIRONMENT = 'production'
  FILE_RETENTION_HOURS = '48'
  FREE_MAX_FILES_PER_BATCH = '5'
  FRONTEND_URL = 'https://www.axliner.com'
  HOST = '0.0.0.0'
  LEMONSQUEEZY_MAX_MONTHLY_CREDITS = '2000'
  LEMONSQUEEZY_MAX_MONTHLY_PRICE_CENTS = '2000'
  LEMONSQUEEZY_MAX_YEARLY_CREDITS = '24000'
  LEMONSQUEEZY_MAX_YEARLY_PRICE_CENTS = '19000'
  LEMONSQUEEZY_MEGA_MONTHLY_CREDITS = '7000'
  LEMONSQUEEZY_MEGA_MONTHLY_PRICE_CENTS = '5000'
  LEMONSQUEEZY_MEGA_YEARLY_CREDITS = '84000'
  LEMONSQUEEZY_MEGA_YEARLY_PRICE_CENTS = '53000'
  LEMONSQUEEZY_PRO_MONTHLY_CREDITS = '500'
  LEMONSQUEEZY_PRO_MONTHLY_PRICE_CENTS = '700'
  LEMONSQUEEZY_PRO_YEARLY_CREDITS = '6000'
  LEMONSQUEEZY_PRO_YEARLY_PRICE_CENTS = '7000'
  LOG_FORMAT = 'json'
  LOG_LEVEL = 'INFO'
  MAX_BATCH_SIZE = '100'
  MAX_CONCURRENT_OCR_CALLS = '6'
  MAX_FILE_SIZE_MB = '10'
  MAX_MAX_FILES_PER_BATCH = '50'
  MEGA_MAX_FILES_PER_BATCH = '100'
  PORT = '8080'
  OLMOCR_BASE_DELAY_SECONDS = '0'
  OLMOCR_EXPONENTIAL_BACKOFF = 'false'
  PRO_MAX_FILES_PER_BATCH = '30'
  QUEUE_ADMISSION_MAX_ACTIVE_JOBS = '100'
  QUEUE_ADMISSION_MAX_QUEUED_JOBS = '50'
  RATE_LIMIT_ANONYMOUS_IMAGES_PER_DAY = '9'
  RATE_LIMIT_ANONYMOUS_RUNS_PER_DAY = '3'
  RATE_LIMIT_ANONYMOUS_JOBS_PER_MINUTE = '3'
  RATE_LIMIT_AUTHENTICATED_IMAGES_PER_DAY = '25'
  RATE_LIMIT_AUTHENTICATED_JOBS_PER_MINUTE = '12'
  RATE_LIMIT_AUTHENTICATED_RUNS_PER_DAY = '5'
  RATE_LIMIT_IP_JOBS_PER_MINUTE = '20'
  RATE_LIMIT_MAX_IMAGES_PER_DAY = '2000'
  RATE_LIMIT_MEGA_IMAGES_PER_DAY = '7000'
  RATE_LIMIT_PRO_IMAGES_PER_DAY = '500'
  RATE_LIMIT_WINDOW_SECONDS = '60'
  REDIS_CONNECT_TIMEOUT = '10'
  REDIS_MAX_CONNECTIONS = '20'
  REDIS_SOCKET_TIMEOUT = '30'
  REDOC_URL = '/redoc'
  SUPABASE_STORAGE_BUCKET = 'jobs'
  TEMP_STORAGE_PATH = '/app/temp_storage'
  WORKER_CONCURRENCY = '4'

[processes]
  app = 'python start.py'
  worker = 'env SERVICE_TYPE=worker python start.py'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/docs'

[[vm]]
  memory = '4gb'
  cpus = 2
  memory_mb = 4096
